        async function callGemini(prompt) {
            const loading = document.getElementById('ai-loading');
            loading.style.display = 'flex';
            
            try {
                let retries = 0;
                const maxRetries = 5;
                let delay = 1000;

                while(retries < maxRetries) {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: `你是一位資深東京旅遊專家。你的回答應該生動、實用且溫馨。使用 Markdown 格式美化。當前語言為：${currentLang}` }] }
                        })
                    });

                    if (response.ok) {
                        const result = await response.json();
                        loading.style.display = 'none';
                        return result.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，AI 暫時無法回應。";
                    } else if (response.status === 429) {
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                        retries++;
                    } else {
                        throw new Error('API Call Failed');
                    }
                }
            } catch (error) {
                console.error(error);
                loading.style.display = 'none';
                return "發生錯誤，請稍後再試。";
            }
        }

                prompt = `根據這份行程：第一天上野淺草、第二天澀谷、第三天迪士尼或讀賣樂園、第四天 teamLab 與麻布台、第五天築地銀座。請給我 2026 年東京旅遊的整體建議，包含當前穿著建議、天氣預報（假設性）、以及一項必備的小物品建議。用繁體中文回答。`;
            } else if (type === 'SPOT_GEMS') {
                prompt = `針對景點「${spotName}」，請推薦 2 個走路 10 分鐘內可到的隱藏版美食或拍照打卡點。不要包含已經在行程裡的內容。用繁體中文回答。`;
            } else if (type === 'PHRASES') {
                prompt = `針對在「${spotName}」這個場合，提供 3 句實用的旅遊日語對話，包含日文、羅馬拼音和中文意思。並簡單說明在該處的溝通禮節。`;
            } else if (type === 'RANDOM_FACT') {
                prompt = `告訴我一個關於東京的冷知識或最新 2026 年的熱門流行文化。`;
            }

            const aiResponse = await callGemini(prompt);
            showAiModal(aiResponse);
        }

        function showAiModal(content) {
            const modal = document.getElementById('ai-modal');
            const contentDiv = document.getElementById('ai-content');
            
            // Basic Markdown to HTML converter (Simplified for this context)
            const html = content
                .replace(/^# (.*$)/gim, '<h1 class="text-2xl font-bold mb-4">$1</h1>')
                .replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold mt-4 mb-2">$1</h2>')
                .replace(/^\* (.*$)/gim, '<li class="ml-4 list-disc">$1</li>')
                .replace(/\n/g, '<br>');

            contentDiv.innerHTML = html;
            modal.style.display = 'flex';
        }

        function closeAiModal() {
            document.getElementById('ai-modal').style.display = 'none';
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang === 'zh' ? 'zh-TW' : (lang === 'ja' ? 'ja' : 'en');
            renderUI();
        }

        function renderUI() {
            const data = i18n[currentLang];
            document.getElementById('hero-title').innerText = data.heroTitle;
            document.getElementById('hero-subtitle').innerText = data.heroSubtitle;
            document.getElementById('btn-day1').innerText = data.navDay1;
            document.getElementById('btn-day2').innerText = data.navDay2;
            document.getElementById('btn-day3').innerText = data.navDay3;
            document.getElementById('btn-day4').innerText = data.navDay4;
            document.getElementById('btn-day5').innerText = data.navDay5;
            document.getElementById('footer-fav').innerText = data.footerFav;
            document.getElementById('footer-map').innerText = data.footerMap;
            renderDayContent();
        }

        function renderDayContent() {
            const container = document.getElementById('main-content');
            const dayData = i18n[currentLang].days[currentDay];
            const t = i18n[currentLang];

            if (dayData === "SPECIAL_D3") {
                container.innerHTML = `
                    <div class="tab-content active">
                        <div class="bg-blue-50 p-6 rounded-2xl mb-10 text-center">
                            <p class="text-blue-800 font-medium italic">${t.schemeMsg}</p>
                        </div>
                        <div class="grid md:grid-cols-2 gap-6">
                            <div class="glass-card rounded-2xl p-6 shadow-sm">
                                <h3 class="text-xl font-bold mb-3"><i class="fas fa-ghost mr-2 text-red-500"></i>${t.planA}</h3>
                                <a href="https://www.google.com/maps/search/?api=1&query=よみうりランド" target="_blank" class="nav-btn">
                                    <i class="fas fa-location-arrow"></i>${t.guideTo} Yomiuriland
                                </a>
                                <button onclick="getAiAdvice('SPOT_GEMS', '讀賣樂園')" class="ai-btn">✨ AI 擴充建議</button>
                            </div>
                            <div class="glass-card rounded-2xl p-6 shadow-sm">
                                <h3 class="text-xl font-bold mb-3"><i class="fas fa-hat-wizard mr-2 text-indigo-500"></i>${t.planB}</h3>
                                <a href="https://www.google.com/maps/search/?api=1&query=東京ディズニーシー" target="_blank" class="nav-btn">
                                    <i class="fas fa-location-arrow"></i>${t.guideTo} DisneySea
                                </a>
                                <button onclick="getAiAdvice('SPOT_GEMS', '東京迪士尼海洋')" class="ai-btn">✨ AI 秘密玩法</button>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                let html = `<div class="tab-content active"><div class="relative pl-12 timeline-line">`;
                dayData.forEach(spot => {
                    const icon = spot.isMeal ? (spot.isTea ? 'fa-cookie' : 'fa-utensils') : 'fa-map-marker-alt';
                    const colorClass = spot.isMeal ? (spot.isTea ? 'bg-pink-500 border-pink-500' : 'bg-orange-500 border-orange-500') : 'bg-blue-600 border-white';
                    const cardBorder = spot.isMeal ? (spot.isTea ? 'border-l-4 border-pink-400' : 'border-l-4 border-orange-400') : '';
                    
                    html += `
                        <div class="mb-10">
                            <div class="spot-dot ${colorClass}"></div>
                            <div class="glass-card rounded-2xl p-6 shadow-sm ${cardBorder}">
                                ${spot.time ? `<span class="text-blue-600 font-bold text-sm uppercase tracking-widest">${spot.time}</span>` : ''}
                                <h3 class="text-xl font-bold mt-1 ${spot.isMeal ? 'text-orange-600' : ''}">
                                    ${spot.isMeal ? `<i class="fas ${icon} mr-2"></i>` : ''}${spot.title}
                                </h3>
                                <p class="text-gray-600 mt-2">${spot.desc}</p>
                                ${spot.img ? `<img src="${spot.img}" class="mt-4 rounded-xl w-full h-48 object-cover" alt="spot image">` : ''}
                                <div class="flex flex-wrap">
                                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(spot.query)}" target="_blank" class="nav-btn ${spot.isMeal ? (spot.isTea ? 'text-pink-600' : 'text-orange-600') : ''}">
                                        <i class="fas ${spot.isMeal ? 'fa-map-marker-alt' : 'fa-location-arrow'}"></i>${spot.isMeal ? t.findBranch : t.guideTo}
                                    </a>
                                    <button onclick="getAiAdvice('SPOT_GEMS', '${spot.title}')" class="ai-btn">${t.aiAdvice}</button>
                                    <button onclick="getAiAdvice('PHRASES', '${spot.title}')" class="ai-btn bg-slate-800">${t.aiLanguage}</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
                container.innerHTML = html;
            }
        }

        function showDay(dayNumber) {
            currentDay = dayNumber;
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-day="${dayNumber}"]`).classList.add('active');
            renderDayContent();
            window.scrollTo({ top: 350, behavior: 'smooth' });
        }

        window.onload = () => renderUI();
    </script>
</body>
</html>
